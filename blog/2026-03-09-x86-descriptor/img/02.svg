<svg aria-roledescription="packet" role="graphics-document document" style="max-width: 258px;" viewBox="0 0 258 94" xmlns="http://www.w3.org/2000/svg" width="100%" id="mermaid-chart"><style>#mermaid-chart{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#mermaid-chart .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#mermaid-chart .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#mermaid-chart .error-icon{fill:#552222;}#mermaid-chart .error-text{fill:#552222;stroke:#552222;}#mermaid-chart .edge-thickness-normal{stroke-width:1px;}#mermaid-chart .edge-thickness-thick{stroke-width:3.5px;}#mermaid-chart .edge-pattern-solid{stroke-dasharray:0;}#mermaid-chart .edge-thickness-invisible{stroke-width:0;fill:none;}#mermaid-chart .edge-pattern-dashed{stroke-dasharray:3;}#mermaid-chart .edge-pattern-dotted{stroke-dasharray:2;}#mermaid-chart .marker{fill:#333333;stroke:#333333;}#mermaid-chart .marker.cross{stroke:#333333;}#mermaid-chart svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#mermaid-chart p{margin:0;}#mermaid-chart .packetByte{font-size:10px;}#mermaid-chart .packetByte.start{fill:black;}#mermaid-chart .packetByte.end{fill:black;}#mermaid-chart .packetLabel{fill:black;font-size:12px;}#mermaid-chart .packetTitle{fill:black;font-size:14px;}#mermaid-chart .packetBlock{stroke:black;stroke-width:1;fill:#efefef;}#mermaid-chart :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g/><g><rect class="packetBlock" height="32" width="155" y="15" x="4"/><text text-anchor="middle" dominant-baseline="middle" class="packetLabel" y="31" x="81.5">Index</text><text text-anchor="end" dominant-baseline="auto" class="packetByte start" y="13" x="159">3</text><text text-anchor="start" dominant-baseline="auto" class="packetByte end" y="13" x="4">7</text><rect class="packetBlock" height="32" width="27" y="15" x="164"/><text text-anchor="middle" dominant-baseline="middle" class="packetLabel" y="31" x="177.5">TI</text><text text-anchor="middle" dominant-baseline="auto" class="packetByte start" y="13" x="177.5">2</text><rect class="packetBlock" height="32" width="59" y="15" x="196"/><text text-anchor="middle" dominant-baseline="middle" class="packetLabel" y="31" x="225.5">RPL</text><text text-anchor="end" dominant-baseline="auto" class="packetByte start" y="13" x="255">0</text><text text-anchor="start" dominant-baseline="auto" class="packetByte end" y="13" x="196">1</text></g><text class="packetTitle" text-anchor="middle" dominant-baseline="middle" y="70.5" x="129">选择子</text></svg>